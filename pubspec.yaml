name: sm64cdpy
description: "A mod catalog for SM64 Coop DX — browse, favorite, and explore mods including DynOS packs, touch controls, and more."
version: 1.1.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2
  go_router: ^17.2.1
  hive_flutter: ^1.1.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.4
  intl: ^0.20.2
  flutter_svg: ^2.0.10+1
  lucide_icons_flutter: ^3.1.12
  google_fonts: ^8.0.2
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  path_provider: ^2.1.0
  http: ^1.2.0
  flutter_file_downloader: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/db/database_sm64coopdx.json
    - assets/db/vip.json
    - assets/db/dynos.json
    - assets/db/touch_controls.json
    - assets/icons/